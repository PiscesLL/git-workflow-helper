name: Bump Version

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: "版本递增类型"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide bump type
        id: decide
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            LAST_MSG=$(git log -1 --format=%s)
            if echo "$LAST_MSG" | grep -q "\[skip bump\]"; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "bump_type=patch" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "bump_type=${{ inputs.bump_type }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Read current version
        if: steps.decide.outputs.skip != 'true'
        id: current
        run: |
          VER=$(grep '^version =' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Bump version
        if: steps.decide.outputs.skip != 'true'
        id: bump
        run: |
          IFS='.' read -r MAJ MIN PAT <<< "${{ steps.current.outputs.version }}"
          BT="${{ steps.decide.outputs.bump_type }}"
          case "$BT" in
            patch) PAT=$((PAT + 1)) ;;
            minor) MIN=$((MIN + 1)); PAT=0 ;;
            major) MAJ=$((MAJ + 1)); MIN=0; PAT=0 ;;
          esac
          NEW_VER="${MAJ}.${MIN}.${PAT}"
          echo "new_version=$NEW_VER" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml
        if: steps.decide.outputs.skip != 'true'
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.bump.outputs.new_version }}\"/" src-tauri/Cargo.toml

      - name: Commit & Tag
        if: steps.decide.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri/Cargo.toml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip bump]"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin main
          git push origin "v${{ steps.bump.outputs.new_version }}"

      - name: Trigger Build workflow for new tag
        if: steps.decide.outputs.skip != 'true'
        run: |
          gh workflow run build.yml --ref "v${{ steps.bump.outputs.new_version }}"
