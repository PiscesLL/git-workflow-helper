name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 图标已提交到仓库，无需重新生成

      # macOS: ad-hoc signing (不需要 Apple 开发者账号)
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: npm run tauri build
        env:
          APPLE_SIGNING_IDENTITY: "-"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npm run tauri build

      - name: Upload .app bundle (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: git-helper-macos
          path: src-tauri/target/release/bundle/macos/*.app

      - name: Upload .dmg (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: git-helper-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload .msi (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: git-helper-windows
          path: src-tauri/target/release/bundle/msi/*.msi

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            git-helper-macos-dmg/*.dmg
            git-helper-windows/*.msi
          generate_release_notes: true
