<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- 背景圆角方块 -->
  <rect width="128" height="128" rx="28" fill="#6366f1"/>

  <!-- Git 分支图标 -->
  <!-- 主干圆点 -->
  <circle cx="44" cy="44" r="9" fill="#ffffff"/>
  <!-- 分支圆点 -->
  <circle cx="44" cy="84" r="9" fill="#ffffff"/>
  <!-- 分支分叉圆点 -->
  <circle cx="88" cy="54" r="9" fill="#ffffff"/>

  <!-- 主干连线（上到下） -->
  <line x1="44" y1="53" x2="44" y2="75" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>

  <!-- 分支连线（左到右） -->
  <line x1="53" y1="64" x2="79" y2="54" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
</svg>
